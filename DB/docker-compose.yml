version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: soporte_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: soporte_tecnico
      POSTGRES_USER: soporte_user
      POSTGRES_PASSWORD: soporte_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soporte_user -d soporte_tecnico"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
